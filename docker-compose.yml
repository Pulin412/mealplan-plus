version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mealplanplus
      POSTGRES_USER: mealplan
      POSTGRES_PASSWORD: mealplan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplan -d mealplanplus"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/mealplanplus
      DB_USER: mealplan
      DB_PASSWORD: mealplan_dev
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-mealplanplus-dev}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
