# ──────────────────────────────────────────────────────────────────────────────
# KEY PACKAGES
# ──────────────────────────────────────────────────────────────────────────────
packages:
  ui_screens:  "com.mealplanplus.ui.screens.<domain>/<ScreenName>.kt + <ScreenName>ViewModel.kt"
  repos:       "com.mealplanplus.data.repository.<Domain>Repository.kt"
  daos:        "com.mealplanplus.data.local.<Domain>Dao.kt"
  entities:    "com.mealplanplus.data.model.<Domain>.kt"
  di:          "com.mealplanplus.di.{DatabaseModule, NetworkModule, AuthModule}.kt"
  notifications: "com.mealplanplus.notification.{NotificationAlarmReceiver, NotificationAlarmBootstrapper, BootReceiver}.kt"
  widget:      "com.mealplanplus.widget.*"
  sync:        "com.mealplanplus.work.SyncWorker.kt"
  health:      "com.mealplanplus.data.healthconnect.{HealthConnectManager, HealthConnectRepository}.kt"
  utils:       "com.mealplanplus.util.{DateUtils, NotificationDecider, AlarmScheduler, SortUtils}.kt"

# ──────────────────────────────────────────────────────────────────────────────
# HARD CONSTRAINTS  (never violate when porting or extending)
# ──────────────────────────────────────────────────────────────────────────────
hard_constraints:
  - "NO destructive Room migrations — always explicit MIGRATION_X_Y"
  - "NO Firestore / Cloud Functions / Firebase Storage / Realtime Database (CI enforced)"
  - "NO automatic seeding of user-facing data at app startup"
  - "Notifications only fire if slot NOT yet logged (shouldPostMealAlarm)"
  - "AlarmManager for notifications — NOT WorkManager"
  - "System food rows are never deleted during re-seed (upsert only, preserves FK refs)"
  - "planned_slots is source of truth for day planning — fall back to diet_slots"
  - "Dates stored as Long epoch ms at midnight UTC — always use DateUtils helpers"
