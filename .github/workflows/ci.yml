name: CI

# Runs on every push to develop, path-filtered per module.
# iOS is dropped (replaced by Next.js PWA). Webapp has its own workflow (webapp.yml).
#
# Trigger model:
#   push to develop  → this workflow (android + backend, path-filtered)
#   push to develop  → webapp.yml (webapp, path-filtered)
#   PR merged → main → backend-deploy.yml (deploy only)

on:
  push:
    branches: [develop]

jobs:
  # ── 1. Detect which modules changed ─────────────────────────────────────────
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/ci.yml'

  # ── 2a. Android build + unit tests ──────────────────────────────────────────
  android:
    name: Android (build + tests)
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build + unit tests
        # --configuration-cache omitted: verifyNoBillableFirebaseFeatures captures
        # a Project reference which is not config-cache serialisable.
        run: >
          ./gradlew
          :android:assembleDebug
          :android:testDebugUnitTest
          --parallel
          --build-cache
          --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: android/build/reports/tests/
          retention-days: 7

  # ── 2b. Backend build + unit tests ──────────────────────────────────────────
  backend:
    name: Backend (build + tests)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build + test
        run: >
          ./gradlew
          :backend:build
          --parallel
          --build-cache
          --configuration-cache
          --no-daemon
        env:
          FIREBASE_PROJECT_ID: test-project

      - name: Docker build check
        run: docker build -t mealplan-api ./backend
