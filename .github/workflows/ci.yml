name: CI

# Single workflow for all modules. Runs on push to develop, path-filtered
# so only the jobs relevant to what changed actually execute.
#
# Trigger model:
#   push to develop  → this file (android + backend + webapp, path-filtered)
#   PR merged → main → backend-deploy.yml (deploy only)

on:
  push:
    branches: [develop]

jobs:
  # ── 1. Detect which modules changed ─────────────────────────────────────────
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      webapp:  ${{ steps.filter.outputs.webapp }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/ci.yml'
            webapp:
              - 'webapp/**'
              - '.github/workflows/ci.yml'

  # ── 2a. Android build + unit tests ──────────────────────────────────────────
  android:
    name: Android (build + tests)
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build
        # --configuration-cache omitted: verifyNoBillableFirebaseFeatures captures
        # a Project reference which is not config-cache serialisable.
        run: >
          ./gradlew
          :android:assembleDebug
          --build-cache
          --no-daemon

  # ── 2b. Backend build + unit tests ──────────────────────────────────────────
  backend:
    name: Backend (build + tests)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build + test
        run: >
          ./gradlew
          :backend:build
          --parallel
          --build-cache
          --configuration-cache
          --no-daemon
        env:
          FIREBASE_PROJECT_ID: test-project

      - name: Docker build check
        run: docker build -t mealplan-api ./backend

  # ── 2c. Webapp type-check, lint + build ─────────────────────────────────────
  webapp:
    name: Webapp (type-check + lint + build)
    needs: detect-changes
    if: needs.detect-changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
