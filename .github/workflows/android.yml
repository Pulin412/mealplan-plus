name: Android CI

# Runs on push to develop when Android OR backend files change.
# Backend changes are included because Android consumes the API —
# a breaking backend change should fail here too.

on:
  push:
    branches: [develop]

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.android == 'true' || steps.filter.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/android.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/android.yml'

  build:
    name: Android — build
    needs: detect-changes
    if: needs.detect-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build
        run: >
          ./gradlew
          :android:assembleDebug
          --build-cache
          --no-daemon
