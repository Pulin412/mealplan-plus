name: Webapp CI

# Runs on push to develop when webapp OR backend files change.
# Backend changes are included because the webapp consumes the API —
# a breaking backend change (renamed field, new required param) should
# fail the TypeScript build here before it reaches production.

on:
  push:
    branches: [develop]

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.webapp == 'true' || steps.filter.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            webapp:
              - 'webapp/**'
              - '.github/workflows/webapp.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/webapp.yml'

  build:
    name: Webapp — type-check + lint + build
    needs: detect-changes
    if: needs.detect-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
          NEXT_PUBLIC_API_BASE_URL: https://mealplan-api-rfo22lhanq-ez.a.run.app
