name: Webapp CI

# Runs on push to develop when webapp files change.
# Mirrors the same trigger model as ci.yml (android + backend).
#
# Deploy is handled separately by Vercel's GitHub integration
# which auto-deploys on push to main.

on:
  push:
    branches: [develop]
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp.yml'

jobs:
  build:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
