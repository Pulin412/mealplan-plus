name: Backend Deploy (Cloud Run)

# Triggers only when main is updated (after PR merge from develop)
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

env:
  GCP_REGION: us-central1
  SERVICE_NAME: mealplan-api
  # Artifact Registry (GCR deprecated 2025)
  IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mealplan/mealplan-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build + test
        run: ./gradlew :backend:build
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build + push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --set-env-vars FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --set-env-vars DB_URL=${{ secrets.DB_URL }} \
            --set-env-vars DB_USER=${{ secrets.DB_USER }} \
            --set-env-vars DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set-env-vars DDL_AUTO=update \
            --set-env-vars DB_DRIVER=org.postgresql.Driver \
            --set-env-vars "DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect"

# Required GitHub secrets:
#   GCP_PROJECT_ID      — GCP project ID
#   GCP_SA_KEY          — Service account JSON (roles: Cloud Run Admin, Artifact Registry Writer, SA User)
#   FIREBASE_PROJECT_ID — Firebase project ID
#   DB_URL              — jdbc:postgresql://<host>/<db> (Neon.tech or Cloud SQL)
#   DB_USER             — DB username
#   DB_PASSWORD         — DB password
