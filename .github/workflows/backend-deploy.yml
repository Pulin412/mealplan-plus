name: Backend — Deploy to Cloud Run

# Deploys the backend to Cloud Run ONLY when a PR from develop is merged
# into main. Direct pushes to main do NOT trigger a deploy.
#
# Branching strategy:
#   feature/* → PR → develop   (CI: build + test)
#   develop   → PR → main      (CI: build + test as gate, then deploy on merge)
#
# Required GitHub secrets:
#   GCP_PROJECT_ID       — GCP project ID
#   GCP_SA_KEY           — base64-encoded service account JSON
#                          Roles: Cloud Run Admin, Artifact Registry Writer, Service Account User
#   FIREBASE_PROJECT_ID  — Firebase project ID
#
# Required Secret Manager secrets (referenced by --set-secrets):
#   mealplan-db-url      — jdbc:postgresql://<host>/<db>?sslmode=require (Neon.tech)
#   mealplan-db-user     — DB username
#   mealplan-db-password — DB password

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

env:
  GCP_REGION: europe-west4
  SERVICE_NAME: mealplan-api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only run when the PR was actually merged (not just closed/abandoned)
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE env
        run: |
          echo "IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mealplan/mealplan-api" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build + test
        run: ./gradlew :backend:build --no-daemon --build-cache --configuration-cache
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --service-account=mealplan-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="SPRING_PROFILES_ACTIVE=docker,FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},DB_DRIVER=org.postgresql.Driver,DDL_AUTO=validate,DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect" \
            --set-secrets="DB_URL=mealplan-db-url:latest,DB_USER=mealplan-db-user:latest,DB_PASSWORD=mealplan-db-password:latest"

      - name: Verify health check
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Deployed to: $URL"
          curl --fail --silent --retry 5 --retry-delay 3 "$URL/actuator/health" \
            | grep -q '"status":"UP"' && echo "Health check passed" || exit 1

      - name: Prune old images (keep latest 3)
        # Deletes all but the 3 most recent image digests after each deploy.
        # Keeps storage within the 0.5 GB Artifact Registry free tier (~200 MB
        # per Spring Boot image). Failures are non-fatal (--async + || true).
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mealplan/mealplan-api"
          gcloud artifacts docker images list "$IMAGE" \
            --sort-by="~CREATE_TIME" \
            --format="get(version)" \
            | tail -n +4 \
            | xargs -I{} gcloud artifacts docker images delete "$IMAGE@{}" \
              --quiet --async 2>/dev/null || true
