name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build + test
        run: >
          ./gradlew
          :backend:build
          --parallel
          --build-cache
          --configuration-cache
          --no-daemon
        env:
          FIREBASE_PROJECT_ID: test-project

      - name: Docker build check
        run: docker build -t mealplan-api ./backend
