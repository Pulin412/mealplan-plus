name: Backend CI

# Runs on push to develop when backend files change.
# Build + test + Docker build check.

on:
  push:
    branches: [develop]

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/backend.yml'

  build:
    name: Backend — build + test
    needs: detect-changes
    if: needs.detect-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build + test
        run: >
          ./gradlew
          :backend:build
          --parallel
          --build-cache
          --configuration-cache
          --no-daemon
        env:
          FIREBASE_PROJECT_ID: test-project

      - name: Docker build check
        run: docker build -t mealplan-api ./backend
