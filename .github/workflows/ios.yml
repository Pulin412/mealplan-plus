name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/ios.yml'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build shared KMP framework (iOS simulator)
        run: >
          ./gradlew
          :shared:linkDebugFrameworkIosSimulatorArm64
          --build-cache
          --configuration-cache
          --no-daemon

      - name: Build iOS app
        run: |
          xcodebuild \
            -project ios/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
